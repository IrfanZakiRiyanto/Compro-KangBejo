# ============================================================
# Nginx Configuration — Kang Bejo Frontend
# Modul 6: Docker Frontend Container
# ============================================================
# Fungsi:
#   1. Serve static React build files
#   2. Proxy /api calls ke backend container
#   3. Redirect semua route ke index.html (SPA support)
#   4. Gzip compression untuk performa
# ============================================================

server {
    listen 80;
    server_name localhost;

    # Root direktori static files
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip Compression ───────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── Security Headers ───────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── API Proxy ke Backend ───────────────────────────────
    # Semua request ke endpoint backend di-proxy ke container backend
    # "backend" = nama service di docker-compose.yml
    location /facilities {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    location /activities {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    location /health {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /about {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /stats {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /team {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /docs {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # ── Static Files Cache ─────────────────────────────────
    # Cache JS/CSS/images untuk 1 tahun (hash di nama file berubah saat deploy)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA Fallback ───────────────────────────────────────
    # Semua route yang tidak cocok di-serve index.html
    # Agar React Router bisa handle navigasi client-side
    location / {
        try_files $uri $uri/ /index.html;
    }
}
